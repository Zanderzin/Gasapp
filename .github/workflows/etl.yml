name: Pipeline ETL Semanal

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/run_etl.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
